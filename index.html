<!doctype html>
<html lang="en" class="dark">
  <head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10B981">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axion Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="bg-background text-on-surface font-body min-h-screen flex flex-col pb-24 md:pb-0">
    <div id="root" class="flex flex-col flex-1 h-full w-full relative"></div>
    <script>
      // Catch runtime JS errors
      window.addEventListener('error', function(e) {
        if (e.message) {
            document.body.innerHTML += '<div style="color:red; background:white; position:fixed; z-index:9999; top:0; left:0; width:100%; padding:20px; font-family:sans-serif; border-bottom:2px solid red;"><b>APP RUNTIME ERROR:</b> ' + e.message + '<br><br><small>If you are on GitHub Pages, make sure API calls are not crashing the app.</small></div>';
        }
      });
      // Catch resource loading errors (like 404 for scripts/css)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            document.body.innerHTML += '<div style="color:red; background:white; position:fixed; z-index:9999; top:0; left:0; width:100%; padding:20px; font-family:sans-serif; border-bottom:2px solid red;"><b>RESOURCE LOAD ERROR:</b> Failed to load ' + e.target.src + (e.target.href || '') + '. <br><br>This usually means the base URL is incorrect for GitHub Pages. The repository name must be included in the URL paths.</div>';
        }
      }, true); // Use capture phase for resource errors
      window.addEventListener('unhandledrejection', function(e) {
        console.error("Unhandled promise rejection:", e.reason);
      });
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
